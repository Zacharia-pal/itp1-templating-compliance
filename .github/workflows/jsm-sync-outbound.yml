name: JSM sync outbound

# Zet open GIT-tickets om naar feature branches. Draait elke 5 min.
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  outbound:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install deps
        run: pip install requests

      - name: run outbound sync
        env:
          JIRA_USER: ${{ secrets.JIRA_USER }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: python scripts/jsm_sync_outbound.py
