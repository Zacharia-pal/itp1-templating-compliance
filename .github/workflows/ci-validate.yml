name: CI template validatie

# Checkt op elke push en PR of alle templates parsen en of de extends/include
# verwijzingen bestaan. Zo valt een kapotte template meteen op.
on:
  push:
    branches: [vintage_1074, main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install deps
        run: pip install jinja2

      - name: valideer templates
        run: python scripts/validate_templates.py
