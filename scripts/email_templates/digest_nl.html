{# NL digest. Inline styles want Outlook desktop negeert <style> blocks.
   De MSO comment forceert een vaste tabelbreedte in Outlook. #}
<div style="font-family:Segoe UI, Arial, sans-serif; font-size:14px; color:#222;">
    <p>Dag team,</p>
    <p>Hieronder de {{ count }} template-tickets die in de laatste 24u gewijzigd zijn.</p>

    <!--[if mso]>
    <table width="640" cellpadding="0" cellspacing="0"><tr><td>
    <![endif]-->
    <table style="border-collapse:collapse; width:100%; max-width:640px;">
        <tr style="background:#0b3d61; color:#fff;">
            <td style="padding:6px 8px;">Ticket</td>
            <td style="padding:6px 8px;">Type</td>
            <td style="padding:6px 8px;">Status</td>
            <td style="padding:6px 8px;">Behandelaar</td>
        </tr>
        {% for r in rows %}
        <tr style="border-bottom:1px solid #ddd;">
            <td style="padding:6px 8px;"><a href="{{ r.url }}">{{ r.key }}</a> - {{ r.summary }}</td>
            <td style="padding:6px 8px;">{{ r.type }}</td>
            <td style="padding:6px 8px;">{{ r.status }}</td>
            <td style="padding:6px 8px;">{{ r.assignee }}</td>
        </tr>
        {% endfor %}
    </table>
    <!--[if mso]></td></tr></table><![endif]-->

    <p style="color:#777; font-size:12px;">Automatische digest, niet beantwoorden.</p>
</div>
